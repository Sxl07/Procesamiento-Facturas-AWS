spring:
  application:
    name: backend-springboot
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_2pUQQzuQ3}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  security:
    cognito:
      client-id: ${COGNITO_CLIENT_ID:290dbnul3baj9as6ii45r29qoe}
  uploads:
    bucket-name: ${APP_UPLOADS_BUCKET_NAME}
    invoice-metadata-table: ${APP_INVOICE_METADATA_TABLE}
    upload-prefix: ${APP_UPLOAD_PREFIX:incoming/}
    max-file-size-bytes: ${APP_MAX_FILE_SIZE_BYTES:10485760}
    allowed-content-types:
      - application/pdf

aws:
  region: ${AWS_REGION:us-east-1}